<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUT10 - Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <a href="../dashboard/index.html" class="btn-voltar">⬅ Voltar</a>
        <h2>Gestão de Alunos</h2>
        <button id="btn-novo-aluno" class="btn-add">+</button>
    </header>

    <section class="filtros-container">
        <input type="text" id="busca-nome" placeholder="🔍 Buscar aluno pelo nome...">
        <div class="filtros-seletores">
            <select id="filtro-turma-busca">
                <option value="">Selecione uma turma...</option>
            </select>
            <select id="filtro-status-busca">
                <option value="">Todos os Status</option>
                <option value="ATIVO">🟢 Ativos</option>
                <option value="INATIVO">🔴 Inativos</option>
            </select>
            <select id="filtro-habilidade">
                <option value="">Todas Habilidades</option>
                <option value="⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐ (10)</option>
                <option value="⭐⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐⭐+ (8+)</option>
            </select>
        </div>
    </section>

    <main class="alunos-lista" id="alunos-lista"></main>

    <div id="modal-aluno" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Ficha Completa do Aluno</h3>
                <button id="btn-fechar-modal" class="btn-fechar">&times;</button>
            </div>

            <div class="tab-menu">
                <button class="tab-btn active" data-tab="dados-tecnicos">⚽ Técnico</button>
                <button class="tab-btn" data-tab="dados-responsaveis">👥 Família</button>
                <button class="tab-btn" data-tab="dados-saude">🏥 Saúde/Legal</button>
            </div>

            <form id="formAluno">
                <input type="hidden" id="aluno-id">

                <div id="dados-tecnicos" class="tab-content active">
                    <div class="foto-upload-container">
                        <div class="avatar-preview" id="foto-preview">📸</div>
                        <label class="btn-upload-foto">Selecionar Foto<input type="file" accept="image/*" id="foto-aluno" style="display:none;"></label>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Nome Completo:</label><input type="text" id="aluno-nome" required></div>
                        <div class="form-group"><label>Situação do Cadastro:</label><input type="text" id="aluno-status-exibicao" readonly value="ATIVO" style="font-weight: bold; text-align: center;"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Data Nascimento:</label><input type="date" id="data-nasc" required></div>
                        <div class="form-group"><label>Idade Calculada:</label><input type="text" id="idade-aluno" readonly placeholder="Calculada automaticamente"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Turma:</label><input type="text" id="aluno-turma" placeholder="Ex: SUB-5" required></div>
                        <div class="form-group">
                            <label>Frequência Semanal:</label>
                            <select id="aluno-frequencia">
                                <option value="1x na semana">1x na semana</option>
                                <option value="2x na semana">2x na semana</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Habilidade:</label>
                            <select id="select-habilidade">
                                <option value="⭐">⭐</option><option value="⭐⭐">⭐⭐</option><option value="⭐⭐⭐">⭐⭐⭐</option><option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐⭐⭐</option><option value="⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐⭐⭐⭐⭐⭐</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Dia da Semana / Horário das Aulas:</label><input type="text" id="aluno-horario" placeholder="Ex: Seg e Qua - 08:30" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Posição em Campo:</label>
                            <select id="aluno-posicao">
                                <option>Goleiro</option><option>Zagueiro Central</option><option>Quarto Zagueiro</option><option>Lateral Direito</option><option>Lateral Esquerdo</option><option>Ala Direito</option><option>Ala Esquerdo</option><option>Primeiro Volante</option><option>Segundo Volante</option><option>Meia Central</option><option>Meia Direita</option><option>Meia Esquerda</option><option>Meia-Armador</option><option>Meia-Atacante</option><option>Ponta Direito</option><option>Ponta Esquerda</option><option>Segundo Atacante</option><option>Centroavante</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Pé Chutador:</label><select id="aluno-pe"><option>Destro</option><option>Canhoto</option><option>Ambidestro</option></select></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Camiseta:</label><input type="text" id="aluno-camiseta"></div>
                        <div class="form-group"><label>Short:</label><input type="text" id="aluno-short"></div>
                        <div class="form-group"><label>Meião:</label><input type="text" id="aluno-meiao"></div>
                    </div>
                </div>

                <div id="dados-responsaveis" class="tab-content">
                    <div class="form-row">
                        <div class="form-group"><label>Data da Matrícula:</label><input type="date" id="aluno-matricula" required></div>
                        <div class="form-group"><label>CPF da Criança:</label><input type="text" class="mask-cpf" id="aluno-cpf-crianca" placeholder="000.000.000-00"></div>
                    </div>
                    <div class="form-group"><label>Nome do Responsável:</label><input type="text" id="aluno-responsavel" placeholder="Pai, mãe ou tutor" required></div>
                    <div class="form-group"><label>CPF do Responsável:</label><input type="text" class="mask-cpf" id="aluno-cpf-resp" placeholder="000.000.000-00"></div>
                    <div class="form-row">
                        <div class="form-group"><label>WhatsApp Principal:</label><input type="tel" class="mask-celular" id="aluno-whatsapp" placeholder="(00) 00000-0000" required></div>
                        <div class="form-group"><label>Número de Emergência:</label><input type="tel" class="mask-celular" id="aluno-emergencia" placeholder="(00) 00000-0000" required></div>
                    </div>
                    <div class="form-group"><label>Quem está autorizado a retirar a criança?</label><input type="text" id="aluno-retirada" placeholder="Ex: Mãe Maria ou Avô José" required></div>
                    <div class="checkbox-group"><input type="checkbox" id="tem-irmao"><label for="tem-irmao">Tem irmão matriculado?</label></div>
                </div>

                <div id="dados-saude" class="tab-content">
                    <div class="checkbox-group safety-check"><input type="checkbox" id="atestado-dia"><label for="atestado-dia">🩺 Atestado Médico em Dia?</label></div>
                    <div class="checkbox-group safety-check"><input type="checkbox" id="uso-imagem"><label for="uso-imagem">📸 Autorização de Uso de Imagem?</label></div>
                    <div class="form-group" style="margin-top:15px;"><label>Restrições de Saúde (Asma, Bronquite, Coração, etc):</label><textarea id="aluno-saude" rows="2"></textarea></div>
                    <div class="form-group"><label>Alergias ou Medicamentos Contínuos:</label><input type="text" id="aluno-alergias"></div>
                    <div class="form-row">
                        <div class="form-group"><label>Convênio:</label><input type="text" id="aluno-convenio"></div>
                        <div class="form-group"><label>Nº Carteirinha:</label><input type="text" id="aluno-carteirinha"></div>
                    </div>
                </div>
                <button type="submit" class="btn-salvar-aluno">Salvar Ficha do Aluno</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
